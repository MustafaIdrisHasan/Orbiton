  /internal/resumes/parse-callback:
    post:
      tags: [Internal]
      summary: Webhook from resume_service when async parse completes (HMAC-signed JSON body)
      description: |
        Headers required: `X-Orbiton-Timestamp` (unix seconds), `X-Orbiton-Signature` (`sha256=<hex>`).
        Body is raw JSON verified before parse. Configure `INTERNAL_HMAC_SECRET` on Node and Python.
      security: []
      parameters:
        - in: header
          name: X-Orbiton-Timestamp
          required: true
          schema: { type: string }
        - in: header
          name: X-Orbiton-Signature
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [resume_id, status, parse_version, model_version]
              properties:
                resume_id: { type: string, format: uuid }
                job_id: { type: string }
                status:
                  type: string
                  enum: [queued, parsing, succeeded, failed]
                json_resume: { type: object, nullable: true }
                raw_text_chars: { type: integer, nullable: true }
                parse_version: { type: string }
                model_version: { type: string }
                failure_reason: { type: string, nullable: true }
                duration_ms: { type: integer, nullable: true }
      responses:
        "204":
          description: Row persisted
        "400":
          description: Invalid body or status
        "401":
          description: Missing or invalid HMAC
        "500":
          description: INTERNAL_HMAC_SECRET not set or persistence error
  /internal/embeddings/student/{id}:
    post:
      tags: [Internal]
      summary: Upsert student profile embedding (HMAC-signed)
      security: []
      parameters:
        - in: path
