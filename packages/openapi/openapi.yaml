openapi: 3.1.0
info:
  title: Orbiton API
  version: 1.2.0
  description: Placement management REST API for Orbiton, including recruiter dashboard and workflow contracts.
servers:
  - url: /api/v1
tags:
  - name: Auth
  - name: Users
  - name: Students
  - name: Drives
  - name: Companies
  - name: Applications
  - name: Rounds
  - name: Offers
  - name: Notifications
  - name: Recruiter
  - name: TPO
  - name: Admin
  - name: Resumes
  - name: Matching
  - name: Predictions
  - name: Intelligence
  - name: Internal
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    Role:
      type: string
      enum: [STUDENT, FACULTY, ADMIN, RECRUITER, TPO]
    AuthUser:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        roles:
          type: array
          items:
            $ref: "#/components/schemas/Role"
    AuthResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            token:
              type: string
    SessionUser:
      type: object
      properties:
        userId:
          type: string
        email:
          type: string
          format: email
        role:
          $ref: "#/components/schemas/Role"
        roles:
          type: array
          items:
            $ref: "#/components/schemas/Role"
    IntelligenceStatus:
      type: object
      description: Which optional intelligence backends are configured (URLs are not exposed)
      properties:
        service:
          type: string
          example: orbiton-ml-service
        status:
          type: string
          example: planned
        predictionServiceUrl:
          type: boolean
          description: True when PREDICTION_SERVICE_URL is set (FastAPI prediction_service)
        matchingServiceUrl:
          type: boolean
          description: True when MATCHING_SERVICE_URL is set
        resumeServiceUrl:
          type: boolean
          description: True when RESUME_SERVICE_URL is set
        pgvectorMatching:
          type: boolean
          description: True when USE_PGVECTOR_MATCHING is enabled (requires pgvector + embeddings)
        legacyMlServiceUrl:
          type: string
          description: Configured ML_SERVICE_URL for legacy Flask baseline
    PlacementPredictionRequest:
      type: object
      required: [studentId]
      properties:
        studentId:
          type: string
        resumeScore:
          type: number
          nullable: true
        cgpa:
          type: number
          nullable: true
        hasInternship:
          type: boolean
        projectCount:
          type: integer
        backlogs:
          type: integer
        skillCount:
          type: integer
          description: Optional override; otherwise derived from stored resume profile
        department:
          type: string
        year:
          type: integer
        hackathonCount:
          type: integer
        certificationCount:
          type: integer
        communicationScore:
          type: number
          nullable: true
    PlacementPredictionResponse:
      type: object
      properties:
        available:
          type: boolean
        studentId:
          type: string
        payload:
          type: object
          description: Feature payload sent to or derived for the model
        probability:
          type: number
        riskBand:
          type: string
          enum: [low, medium, high]
        modelVersion:
          type: string
        contributions:
          description: Feature contributions (object for legacy Flask; array of {feature, contribution} for FastAPI)
          oneOf:
            - type: object
              additionalProperties: true
            - type: array
              items:
                type: object
        features:
          type: object
          additionalProperties: true
        preview:
          type: boolean
          description: True when model is baseline/public-data only (FastAPI path)
        rationale:
          type: string
        backend:
          type: string
          description: prediction_service | ml_service_flask
    SessionResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/SessionUser"
    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        roles:
          type: array
          items:
            $ref: "#/components/schemas/Role"
    DriveSummary:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        openings:
          type: integer
        location:
          type: string
        applicationDeadline:
          type: string
          format: date-time
        status:
          type: string
        isFeatured:
          type: boolean
        candidateCount:
          type: integer
        companyName:
          type: string
        packageLpa:
          type: number
          nullable: true
        employmentType:
          type: string
          enum: [FULL_TIME, INTERNSHIP]
        eligibleDepartments:
          type: array
          items:
            type: string
        minCgpa:
          type: number
          nullable: true
        maxBacklogs:
          type: integer
          nullable: true
        eligibleYears:
          type: array
          items:
            type: string
        requiredSkills:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
          nullable: true
    DriveLifecycleStatus:
      type: string
      enum: [DRAFT, PUBLISHED, CLOSED, ACTIVE]
      description: ACTIVE is accepted as legacy and normalized to PUBLISHED in responses where applicable
    RecruiterDriveListItem:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        status: { $ref: "#/components/schemas/DriveLifecycleStatus" }
        applicants_count: { type: integer }
        shortlisted_count: { type: integer }
        selected_count: { type: integer }
        deadline: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time, nullable: true }
        packageLpa: { type: number, nullable: true }
        employmentType: { type: string }
        eligibleDepartments:
          type: array
          items: { type: string }
        rounds_count: { type: integer }
        description: { type: string }
        openings: { type: integer }
        location: { type: string }
        isFeatured: { type: boolean }
        applicationDeadline: { type: string, format: date-time, nullable: true }
        candidateCount: { type: integer }
        companyName: { type: string }
    DriveStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          $ref: "#/components/schemas/DriveLifecycleStatus"
    DriveDetail:
      allOf:
        - $ref: "#/components/schemas/DriveSummary"
        - type: object
          properties:
            roundDeadlines:
              type: array
              items:
                $ref: "#/components/schemas/DeadlineItem"
            recruiter:
              type: object
              properties:
                companyName:
                  type: string
                designation:
                  type: string
    CompanyHiringStatus:
      type: string
      enum: [ACTIVE, PAST, INACTIVE]
    CompanySummary:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        industry:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        website:
          type: string
          nullable: true
        logoUrl:
          type: string
          nullable: true
        highestPackage:
          type: number
          nullable: true
        avgPackage:
          type: number
          nullable: true
        totalDrives:
          type: integer
        activeDrivesCount:
          type: integer
        departmentsHired:
          type: array
          items:
            type: string
        rolesOffered:
          type: array
          items:
            type: string
        hiringStatus:
          $ref: "#/components/schemas/CompanyHiringStatus"
        lastActivityAt:
          type: string
          format: date-time
          nullable: true
        selectionRatio:
          type: number
          nullable: true
    CompanyDriveRef:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        status:
          type: string
        applicationDeadline:
          type: string
          format: date-time
          nullable: true
        packageLpa:
          type: number
          nullable: true
        location:
          type: string
          nullable: true
        openings:
          type: integer
          nullable: true
    CompanyDetail:
      allOf:
        - $ref: "#/components/schemas/CompanySummary"
        - type: object
          properties:
            designation:
              type: string
              nullable: true
            activeDrives:
              type: array
              items:
                $ref: "#/components/schemas/CompanyDriveRef"
            pastDrives:
              type: array
              items:
                $ref: "#/components/schemas/CompanyDriveRef"
    RecruiterDriveOption:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        openings:
          type: integer
        applicationDeadline:
          type: string
          format: date-time
        status:
          type: string
    DeadlineItem:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
        date:
          type: string
          format: date-time
    FunnelStage:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/ApplicationStatus"
        count:
          type: integer
    DepartmentCount:
      type: object
      properties:
        department:
          type: string
        count:
          type: integer
    GenderRatio:
      type: object
      properties:
        male:
          type: integer
        female:
          type: integer
        other:
          type: integer
    RecruiterDashboardResponse:
      type: object
      properties:
        recruiter:
          type: object
          properties:
            id:
              type: string
            userId:
              type: string
            companyName:
              type: string
            designation:
              type: string
        activeDrive:
          type: object
          properties:
            id:
              type: string
            title:
              type: string
            openings:
              type: integer
            location:
              type: string
            applicationDeadline:
              type: string
              format: date-time
            status:
              type: string
            roundDeadlines:
              type: array
              items:
                $ref: "#/components/schemas/DeadlineItem"
        funnel:
          type: array
          items:
            $ref: "#/components/schemas/FunnelStage"
        quickStats:
          type: object
          properties:
            totalApplications:
              type: integer
            shortlistedCandidates:
              type: integer
            selectedCandidates:
              type: integer
            offeredCandidates:
              type: integer
        demographics:
          type: object
          properties:
            genderRatio:
              $ref: "#/components/schemas/GenderRatio"
            departmentCounts:
              type: array
              items:
                $ref: "#/components/schemas/DepartmentCount"
    ApplicationStatus:
      type: string
      enum: [APPLIED, SHORTLISTED, INTERVIEW, SELECTED, OFFERED, REJECTED]
    CandidateListItem:
      type: object
      properties:
        applicationId:
          type: string
        serialNo:
          type: integer
        name:
          type: string
        branch:
          type: string
        rollNumber:
          type: string
        cgpa:
          type: number
        backlogs:
          type: integer
        skills:
          type: array
          items:
            type: string
        status:
          $ref: "#/components/schemas/ApplicationStatus"
        currentRound:
          type: string
    CandidateListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CandidateListItem"
        total:
          type: integer
    CandidateProfile:
      type: object
      properties:
        applicationId:
          type: string
        driveId:
          type: string
        driveTitle:
          type: string
        personalDetails:
          type: object
          properties:
            name:
              type: string
            rollNumber:
              type: string
            branch:
              type: string
            year:
              type: string
            gender:
              type: string
            email:
              type: string
              format: email
        academics:
          type: object
          properties:
            cgpa:
              type: number
            backlogs:
              type: integer
        skills:
          type: array
          items:
            type: string
        projects:
          type: array
          items:
            type: string
        resumePreview:
          type: string
        testScores:
          type: array
          items:
            type: object
            properties:
              label:
                type: string
              value:
                type: string
        notes:
          type: string
        status:
          $ref: "#/components/schemas/ApplicationStatus"
        currentRound:
          type: string
    ApplicationActionResponse:
      type: object
      properties:
        message:
          type: string
        applicationId:
          type: string
        driveId:
          type: string
        status:
          $ref: "#/components/schemas/ApplicationStatus"
        currentRound:
          type: string
    RecruiterInterview:
      type: object
      properties:
        id:
          type: string
        driveId:
          type: string
        candidateId:
          type: string
        candidateName:
          type: string
        round:
          type: string
        slot:
          type: string
          format: date-time
        mode:
          type: string
        panel:
          type: string
        feedbackStatus:
          type: string
    RecruiterInterviewCreateRequest:
      type: object
      required: [driveId, candidateId, candidateName, slot]
      properties:
        driveId:
          type: string
        candidateId:
          type: string
        candidateName:
          type: string
        round:
          type: string
        slot:
          type: string
          format: date-time
        mode:
          type: string
        panel:
          type: string
    RecruiterInterviewListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/RecruiterInterview"
    BroadcastRequest:
      type: object
      required: [driveId, audience, message]
      properties:
        driveId:
          type: string
        audience:
          type: string
        message:
          type: string
    BroadcastResponse:
      type: object
      properties:
        message:
          type: string
        item:
          type: object
          properties:
            id:
              type: string
            driveId:
              type: string
            audience:
              type: string
            message:
              type: string
            sentAt:
              type: string
              format: date-time
            isRead:
              type: boolean
    ExportOption:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
        format:
          type: string
    ExportListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ExportOption"
    Notification:
      type: object
      properties:
        id:
          type: string
        user_id:
          type: string
          nullable: true
        type:
          type: string
          enum: [APPLICATION, SHORTLIST, ROUND, OFFER, DRIVE, ANNOUNCEMENT]
        title:
          type: string
        message:
          type: string
        entityId:
          type: string
          nullable: true
        driveId:
          type: string
          nullable: true
        audience:
          type: string
          nullable: true
        source:
          type: string
          enum: [STUDENT, RECRUITER, INSTITUTION]
          nullable: true
        isRead:
          type: boolean
        sentAt:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
          description: Alias of sentAt when present
    NotificationListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Notification"
        unreadCount:
          type: integer
security:
  - bearerAuth: []
paths:
  /auth/login:
    post:
      tags: [Auth]
      summary: Log a user in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: JWT token for a seeded account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /auth/me:
    get:
      tags: [Auth]
      summary: Get the authenticated session user
      responses:
        "200":
          description: Authenticated session payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      responses:
        "200":
          description: Refresh scaffold response
  /users:
    get:
      tags: [Users]
      summary: List users
      responses:
        "200":
          description: User list
    post:
      tags: [Users]
      summary: Create a user
      responses:
        "201":
          description: User created
  /students/profile/me:
    get:
      tags: [Students]
      summary: Get authenticated student profile
      responses:
        "200":
          description: Student profile
  /drives:
    get:
      tags: [Drives]
      summary: List placement drives (PUBLISHED only) or all drives for the recruiter
      parameters:
        - in: query
          name: created_by
          schema:
            type: string
            enum: [me]
          description: If me, return recruiter-owned drives with metrics (RECRUITER only)
      responses:
        "200":
          description: Drive list
          content:
            application/json:
              schema:
                type: object
                properties:
                  resource:
                    type: string
                  items:
                    type: array
                    items:
                      oneOf:
                        - $ref: "#/components/schemas/DriveSummary"
                        - $ref: "#/components/schemas/RecruiterDriveListItem"
        "403":
          description: Forbidden (created_by=me without recruiter role)
    post:
      tags: [Drives]
      summary: Create a placement drive
      responses:
        "201":
          description: Drive created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DriveSummary"
  /drives/{id}:
    get:
      tags: [Drives]
      summary: Get drive detail
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Drive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DriveDetail"
        "404": { description: Not found }
    patch:
      tags: [Drives]
      summary: Update drive (partial)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema: { type: object }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RecruiterDriveListItem" }
    delete:
      tags: [Drives]
      summary: Delete drive (DRAFT only)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "204": { description: Deleted }
        "403": { description: Not a draft }
        "404": { description: Not found }
  /drives/{id}/status:
    patch:
      tags: [Drives]
      summary: Change drive lifecycle status
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DriveStatusUpdate" }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RecruiterDriveListItem" }
        "400": { description: Invalid transition or status }
        "403": { description: Forbidden }
        "404": { description: Not found }
  /companies:
    get:
      tags: [Companies]
      summary: List companies derived from recruiters and drives
      responses:
        "200":
          description: Company directory list
          content:
            application/json:
              schema:
                type: object
                properties:
                  resource:
                    type: string
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/CompanySummary"
  /companies/{id}:
    get:
      tags: [Companies]
      summary: Get company with active and past drives
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Company detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyDetail"
        "404":
          description: Company not found
  /applications/apply/{driveId}:
    post:
      tags: [Applications]
      summary: Apply to a drive
      parameters:
        - in: path
          name: driveId
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Application accepted
  /rounds:
    get:
      tags: [Rounds]
      summary: List rounds
      responses:
        "200":
          description: Round list
  /offers:
    get:
      tags: [Offers]
      summary: List offers
      responses:
        "200":
          description: Offer list
  /notifications:
    get:
      tags: [Notifications]
      summary: List notifications
      responses:
        "200":
          description: Notification list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationListResponse"
  /notifications/read-all:
    post:
      tags: [Notifications]
      summary: Mark all notifications as read
      responses:
        "200":
          description: Count of notifications updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  updated:
                    type: integer
                  message:
                    type: string
  /notifications/{id}/read:
    post:
      tags: [Notifications]
      summary: Mark a notification as read
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Acknowledgement
        "404":
          description: Notification not found
    patch:
      tags: [Notifications]
      summary: Mark a notification as read (alias)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Acknowledgement
        "404":
          description: Notification not found
  /recruiter/dashboard:
    get:
      tags: [Recruiter]
      summary: Get recruiter dashboard for the selected drive
      parameters:
        - in: query
          name: driveId
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Recruiter dashboard payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecruiterDashboardResponse"
  /recruiter/drives:
    get:
      tags: [Recruiter]
      summary: List recruiter-owned drives for the dashboard selector
      responses:
        "200":
          description: Recruiter drive options
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/RecruiterDriveOption"
  /recruiter/drives/{driveId}/candidates:
    get:
      tags: [Recruiter]
      summary: List candidates for a recruiter-owned drive
      parameters:
        - in: path
          name: driveId
          required: true
          schema:
            type: string
        - in: query
          name: branch
          schema:
            type: string
        - in: query
          name: cgpaMin
          schema:
            type: number
        - in: query
          name: status
          schema:
            $ref: "#/components/schemas/ApplicationStatus"
        - in: query
          name: search
          schema:
            type: string
      responses:
        "200":
          description: Candidate table data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CandidateListResponse"
  /recruiter/candidates/{candidateId}:
    get:
      tags: [Recruiter]
      summary: Get recruiter candidate profile for drawer or full page
      parameters:
        - in: path
          name: candidateId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Candidate profile payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CandidateProfile"
  /recruiter/applications/{applicationId}/shortlist:
    post:
      tags: [Recruiter]
      summary: Shortlist a candidate within a drive
      parameters:
        - in: path
          name: applicationId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Candidate shortlisted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationActionResponse"
  /recruiter/applications/{applicationId}/reject:
    post:
      tags: [Recruiter]
      summary: Reject a candidate within a drive
      parameters:
        - in: path
          name: applicationId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Candidate rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationActionResponse"
